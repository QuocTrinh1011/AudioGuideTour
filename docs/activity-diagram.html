<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioGuideSystem — Activity Diagram (UML)</title>
    <style>
        :root {
            --ink: #17212b;
            --surface: #ffffff;
            --border: #e2e8f0;
            --primary: #0369a1;
            --primary-dark: #0c4a6e;
            --accent: #059669;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI Variable", "Aptos", "Segoe UI", system-ui, sans-serif;
            background: linear-gradient(135deg, #ecfdf5 0%, #f0f9ff 50%, #f8fafc 100%);
            color: var(--ink);
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #064e3b, #0c4a6e, #1e3a5f);
            color: white;
            padding: 2rem 2rem 1.6rem;
            text-align: center;
        }
        header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; }
        header p { opacity: 0.8; margin-top: 0.4rem; font-size: 0.95rem; }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            padding: 1rem 1rem 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border);
            background: var(--surface);
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--ink);
        }
        .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
        .tab-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

        .container { max-width: 1400px; margin: 1.2rem auto; padding: 0 1rem; }
        .card {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 { font-size: 1.15rem; margin-bottom: 0.2rem; color: var(--primary); }
        .card .desc { font-size: 0.85rem; color: #64748b; margin-bottom: 1rem; }

        .diagram-stage {
            display: flex;
            justify-content: center;
            min-height: 200px;
            overflow-x: auto;
        }
        .diagram-stage svg { max-width: 100%; height: auto; }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .meta-box {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.9rem 1rem;
            font-size: 0.82rem;
        }
        .meta-box h4 {
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            margin-bottom: 0.4rem;
        }
        .meta-box ul { padding-left: 1.1rem; }
        .meta-box li { margin-bottom: 0.2rem; }
        .meta-box code {
            background: #dbeafe;
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-size: 0.76rem;
        }

        .summary-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 0.8rem; }
        .summary-table th, .summary-table td { padding: 0.5rem 0.7rem; border: 1px solid var(--border); text-align: left; vertical-align: top; }
        .summary-table th { background: #f1f5f9; font-weight: 700; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .lane-legend {
            display: flex; gap: 1rem; flex-wrap: wrap;
            margin-bottom: 1rem; font-size: 0.8rem;
        }
        .lane-legend span {
            display: flex; align-items: center; gap: 0.4rem;
        }
        .dot {
            width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
        }
        .dot.user { background: #3b82f6; }
        .dot.system { background: #8b5cf6; }
        .dot.db { background: #f59e0b; }
        .dot.decision { background: #ef4444; }

        footer { text-align: center; padding: 1.5rem; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>AudioGuideSystem — Activity Diagram (UML)</h1>
    <p>6 luồng hoạt động chính — suy ra từ PRD, Sequence Diagrams (J01-J03, F01-F11) & Database</p>
</header>

<div class="tabs" id="tabBar"></div>

<div class="container" id="content"></div>

<footer>AudioGuideSystem PRD · Activity Diagrams · Rendered by Mermaid.js</footer>

<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'default',
        fontFamily: 'Segoe UI Variable, Aptos, Segoe UI, sans-serif',
        flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }
    });

    const activities = [
        // =============================================
        // 1. VISITOR BOOTSTRAP & START TOUR (J01)
        // =============================================
        {
            id: 'bootstrap',
            title: 'A01 — Visitor Bootstrap & Bắt đầu tham quan',
            desc: 'Toàn bộ luồng từ lúc Visitor mở app, nhập API URL, bootstrap dữ liệu, cấp quyền GPS, bật tracking cho đến khi bắt đầu nhận audio tự động.',
            sequences: 'J01, F05, F07',
            actors: 'Visitor, Mobile App, Backend API, SQL Server',
            meta: [
                {
                    title: 'User Actions',
                    items: [
                        'Mở ứng dụng AudioTourApp',
                        'Nhập hoặc giữ nguyên API Base URL',
                        'Bấm nút Bootstrap / Bật Tracking',
                        'Cấp quyền vị trí khi OS hỏi'
                    ]
                },
                {
                    title: 'System Processing',
                    items: [
                        '<code>POST /api/user</code> — Sync visitor profile',
                        '<code>GET /api/bootstrap?lang=</code> — Tải POI + Tour',
                        'Khởi động Foreground Service GPS',
                        '<code>POST /api/tracking</code> — Gửi batch GPS định kỳ'
                    ]
                },
                {
                    title: 'Database Operations',
                    items: [
                        '<code>SELECT/INSERT Visitors</code> — Upsert visitor',
                        '<code>SELECT Pois WHERE IsActive=true</code>',
                        '<code>SELECT Tours WHERE IsActive=true</code>',
                        '<code>INSERT UserTrackings</code> — Lưu GPS points'
                    ]
                }
            ],
            mermaid: `flowchart TD
    START(( )) --> A1["🧑 Visitor mở AudioTourApp"]
    A1 --> A2["🧑 Nhập API Base URL\\nhoặc giữ mặc định"]
    A2 --> A3["📱 POST /api/user\\nSync visitor profile"]
    A3 --> DB1[("💾 UPSERT Visitors\\ntheo userId hoặc deviceId")]
    DB1 --> D1{"Visitor mới\\nhay đã tồn tại?"}
    D1 -- Mới --> A4["📱 Tạo profile mới\\nAllowAutoPlay = true"]
    D1 -- Đã có --> A5["📱 Cập nhật LastSeenAt\\nLấy Language từ server"]
    A4 --> A6["🧑 Bấm nút Bootstrap"]
    A5 --> A6
    A6 --> A7["📱 GET /api/bootstrap?lang=vi"]
    A7 --> DB2[("💾 SELECT Pois\\nWHERE IsActive = true")]
    DB2 --> DB3[("💾 SELECT Tours\\nWHERE IsActive = true")]
    DB3 --> DB4[("💾 SELECT PoiTranslations\\nWHERE IsPublished = true")]
    DB4 --> A8["📱 Parse & cache\\nPOI + Tour + Category"]
    A8 --> A9["📱 Hiển thị Map + Danh sách POI"]
    A9 --> A10["🧑 Bấm Bật Tracking"]
    A10 --> D2{"OS Location\\nPermission?"}
    D2 -- Granted --> A11["📱 StartForegroundService\\nGPS interval = 10s"]
    D2 -- Denied --> A12["📱 Hiện thông báo\\nyêu cầu cấp quyền"]
    A12 --> D3{"Visitor vào\\nSettings cấp quyền?"}
    D3 -- Có --> A11
    D3 -- Không --> A13["📱 Chạy không tracking\\nChỉ xem POI thủ công"]
    A11 --> A14["📱 Timer GPS callback\\nmỗi 10 giây"]
    A14 --> A15["📱 POST /api/tracking\\nbatch GPS data"]
    A15 --> DB5[("💾 INSERT UserTrackings\\nlat, lng, speed, bearing")]
    DB5 --> A16["📱 Đồng thời gọi\\nPOST /api/geofence"]
    A16 --> ENDOK(("✅ Tracking Active\\nSẵn sàng nhận trigger"))
    A13 --> ENDMANUAL(("📖 Chế độ thủ công"))`
        },

        // =============================================
        // 2. GEOFENCE AUTO-PLAY (J02)
        // =============================================
        {
            id: 'geofence',
            title: 'A02 — Geofence Check & Auto-Play Audio',
            desc: 'Luồng xử lý khi app gửi toạ độ GPS lên server, backend đánh giá geofence, kiểm tra anti-spam, trả kết quả và mobile phát audio tự động.',
            sequences: 'J02, F06, F08',
            actors: 'Mobile App, Backend API, SQL Server, Audio Engine',
            meta: [
                {
                    title: 'Decision Points',
                    items: [
                        'Distance <= Radius hay ApproachRadius?',
                        'TriggerMode = enter / nearby / manual / both?',
                        'CooldownUntil <= now? (hết cooldown chưa)',
                        'Debounce check: trigger gần nhất > debounceSeconds?',
                        'AudioUrl hay TtsScript để phát?'
                    ]
                },
                {
                    title: 'Parallel Flows',
                    items: [
                        'Fork: App vừa phát audio, vừa tiếp tục tracking GPS',
                        'Fork: Phát audio xong, POST /api/visit song song với PlayNext()',
                        'Audio queue xử lý tuần tự nhưng tracking chạy song song'
                    ]
                },
                {
                    title: 'Database Operations',
                    items: [
                        '<code>SELECT Pois WHERE IsActive</code> — Load POI gần',
                        '<code>SELECT GeofenceTriggers</code> — Check cooldown',
                        '<code>INSERT GeofenceTriggers</code> — Ghi trigger mới',
                        '<code>INSERT VisitHistories</code> — Ghi lượt nghe'
                    ]
                }
            ],
            mermaid: `flowchart TD
    START(( )) --> A1["📱 Location update callback\\nlat, lng, accuracy"]
    A1 --> A2["📱 POST /api/geofence\\nuserId, lat, lng, language"]
    A2 --> DB1[("💾 SELECT Pois\\nWHERE IsActive = true")]
    DB1 --> A3["⚙️ Tính khoảng cách Haversine\\ntới từng Active POI"]
    A3 --> D1{"distance <= radius?"}
    D1 -- Không --> D2{"distance <= approachRadius?"}
    D2 -- Không --> RES1["⚙️ Response: ShouldPlay = false\\nStatus = out_of_range"]
    D2 -- Có --> RES2["⚙️ Response: ShouldPlay = false\\nStatus = approaching\\nNearbyPois list"]
    D1 -- Có --> A4["⚙️ Tìm POI gần nhất\\ntrong Radius"]
    A4 --> D3{"TriggerMode?"}
    D3 -- "manual" --> RES3["⚙️ ShouldPlay = false\\nReason = manual_mode"]
    D3 -- "enter / nearby / both" --> A5["⚙️ Kiểm tra Anti-Spam"]
    A5 --> DB2[("💾 SELECT GeofenceTriggers\\nWHERE userId + poiId\\nORDER BY RecordedAt DESC")]
    DB2 --> D4{"CooldownUntil > now?"}
    D4 -- Có --> RES4["⚙️ ShouldPlay = false\\nReason = cooldown_active\\nNextEligibleAt = CooldownUntil"]
    D4 -- Không --> D5{"Thời gian từ trigger cuối\\n< debounceSeconds?"}
    D5 -- Có --> RES5["⚙️ ShouldPlay = false\\nReason = debounce"]
    D5 -- Không --> A6["⚙️ TRIGGER THÀNH CÔNG"]
    A6 --> DB3[("💾 INSERT GeofenceTriggers\\nStatus = triggered\\nCooldownUntil = now + cooldownSec")]
    DB3 --> A7["⚙️ Response: ShouldPlay = true\\nTriggeredPoi = POI data"]
    A7 --> A8["📱 Nhận response\\nShouldPlay = true"]
    A8 --> D6{"Có AudioUrl?"}
    D6 -- Có --> A9["🔊 Enqueue AudioUrl\\nMediaPlayer.Start"]
    D6 -- Không --> D7{"Có TtsScript?"}
    D7 -- Có --> A10["🔊 TTS.Speak(script)"]
    D7 -- Không --> A11["📱 Hiển thị nội dung text"]

    A9 --> A12["🔊 Phát audio xong"]
    A10 --> A12
    A12 --> A13["📱 POST /api/visit\\nstartTime, endTime, duration"]
    A13 --> DB4[("💾 INSERT VisitHistories\\nnormalize duration")]
    DB4 --> D8{"Queue còn bài?"}
    D8 -- Có --> A9
    D8 -- Không --> ENDOK(("✅ Chờ location\\nupdate tiếp theo"))

    RES1 --> ENDOK
    RES2 --> ENDOK
    RES3 --> ENDOK
    RES4 --> ENDOK
    RES5 --> ENDOK
    A11 --> ENDOK`
        },

        // =============================================
        // 3. ADMIN AUTHENTICATION (F11)
        // =============================================
        {
            id: 'auth',
            title: 'A03 — Admin Authentication',
            desc: 'Luồng đăng nhập, đăng ký Admin đầu tiên, kiểm tra session, timeout 8 giờ và đăng xuất.',
            sequences: 'F11, J03 Pha 1',
            actors: 'Admin, Browser, ASP.NET MVC, SQL Server',
            meta: [
                {
                    title: 'User Actions',
                    items: [
                        'Truy cập URL Admin site',
                        'Nhập Username + Password',
                        'Bấm Login hoặc Register',
                        'Bấm Logout khi muốn thoát'
                    ]
                },
                {
                    title: 'System Processing',
                    items: [
                        'SessionMiddleware kiểm tra Cookie',
                        'SHA-256 hash password và so sánh',
                        'Tạo HttpOnly Session Cookie (8h)',
                        'Redirect về Login khi hết phiên'
                    ]
                },
                {
                    title: 'Database Operations',
                    items: [
                        '<code>SELECT COUNT(*) FROM AdminUsers</code> — Check first boot',
                        '<code>SELECT AdminUsers WHERE Username</code> — Verify login',
                        '<code>INSERT AdminUsers</code> — Register admin đầu tiên'
                    ]
                }
            ],
            mermaid: `flowchart TD
    START(( )) --> A1["🧑 Admin truy cập\\nAdmin Site URL"]
    A1 --> A2["⚙️ SessionMiddleware\\nkiểm tra Cookie"]
    A2 --> D1{"Session Cookie\\nhợp lệ?"}
    D1 -- Có --> D2{"Session hết hạn\\n> 8 giờ?"}
    D2 -- Chưa --> DASH(("✅ Redirect\\nvào Dashboard"))
    D2 -- Rồi --> A3["⚙️ Destroy session\\nXoá cookie"]
    A3 --> A4["📄 Hiển thị trang Login"]
    D1 -- Không --> DB1[("💾 SELECT COUNT(*)\\nFROM AdminUsers")]
    DB1 --> D3{"AdminUsers\\ncount = 0?"}
    D3 -- Có --> A5["📄 Hiển thị form\\nĐăng Ký Admin đầu tiên"]
    D3 -- Không --> A4
    A5 --> A6["🧑 Nhập Username\\n+ Password + Confirm"]
    A6 --> D4{"Password\\nkhớp confirm?"}
    D4 -- Không --> A7["⚠️ Hiển thị lỗi\\nPassword không khớp"]
    A7 --> A5
    D4 -- Có --> A8["⚙️ Hash SHA-256(password)"]
    A8 --> DB2[("💾 INSERT AdminUsers\\nUsername, PasswordHash")]
    DB2 --> A9["⚙️ CreateSession()\\nSet HttpOnly Cookie 8h"]
    A9 --> DASH

    A4 --> A10["🧑 Nhập Username\\n+ Password"]
    A10 --> A11["⚙️ Hash SHA-256(input)"]
    A11 --> DB3[("💾 SELECT AdminUsers\\nWHERE Username = input")]
    DB3 --> D5{"Tìm thấy user\\nvà hash khớp?"}
    D5 -- Không --> A12["⚠️ 401 Error\\nSai tên hoặc mật khẩu"]
    A12 --> A4
    D5 -- Có --> A9`
        },

        // =============================================
        // 4. POI MANAGEMENT (F01, F02, F04)
        // =============================================
        {
            id: 'poi',
            title: 'A04 — Quản lý POI & Content',
            desc: 'Luồng Admin tạo / chỉnh sửa / xoá POI bao gồm validation toạ độ, upload audio, gán translation đa ngôn ngữ và toggle hiển thị.',
            sequences: 'F01, F02, F04, J03 Pha 2',
            actors: 'Admin, Browser, ASP.NET MVC, SQL Server, Shared Storage',
            meta: [
                {
                    title: 'Decision Points',
                    items: [
                        'Tạo mới hay chỉnh sửa POI?',
                        'Toạ độ hợp lệ? Radius > 0?',
                        'Translation: UNIQUE(PoiId + Language)?',
                        'Audio: File hợp lệ (format + size)?',
                        'Xoá POI: Có Tour đang tham chiếu?'
                    ]
                },
                {
                    title: 'Parallel / Sub-flows',
                    items: [
                        'Tạo POI → sau đó tạo Translation (sub-flow)',
                        'Upload Audio → gán vào POI hoặc Translation',
                        'Toggle IsActive ảnh hưởng Bootstrap runtime'
                    ]
                },
                {
                    title: 'Database Operations',
                    items: [
                        '<code>INSERT/UPDATE/DELETE Pois</code>',
                        '<code>INSERT/UPDATE PoiTranslations</code> + UNIQUE check',
                        'File lưu vào <code>SharedStorage/audio/</code>',
                        '<code>SELECT Categories, Languages</code> — populate dropdowns'
                    ]
                }
            ],
            mermaid: `flowchart TD
    START(( )) --> A1["🧑 Admin vào trang\\nQuản lý POI"]
    A1 --> DB0[("💾 SELECT Pois\\n+ Category + TranslationCount")]
    DB0 --> A2["📄 Hiển thị danh sách POI\\n+ bộ lọc + nút tạo mới"]
    A2 --> D1{"Thao tác?"}

    D1 -- "Tạo mới" --> A3["🧑 Điền form POI\\nName, Address, Lat, Lng"]
    D1 -- "Chỉnh sửa" --> A4["🧑 Click POI cần sửa\\nLoad form với data"]
    D1 -- "Toggle Active" --> A12["⚙️ Toggle IsActive"]
    D1 -- "Xoá" --> D5{"POI có trong\\nTourStop nào?"}

    A3 --> A5["🧑 Nhập Geofence config\\nRadius, TriggerMode, Cooldown"]
    A4 --> A5
    A5 --> A6["🧑 Chọn AudioMode\\n+ Upload audio (optional)"]
    A6 --> D2{"Có upload\\naudio file?"}
    D2 -- Có --> A7["⚙️ Validate file\\nformat + size < 50MB"]
    A7 --> D3{"File hợp lệ?"}
    D3 -- Không --> A8["⚠️ Lỗi định dạng\\nhoặc quá lớn"]
    A8 --> A6
    D3 -- Có --> A9["⚙️ Lưu file vào\\nSharedStorage/audio/"]
    A9 --> A10["⚙️ Set AudioUrl = path"]
    D2 -- Không --> A10
    A10 --> A11["⚙️ Validate toạ độ\\nLat, Lng, Radius > 0"]
    A11 --> D4{"Dữ liệu\\nhợp lệ?"}
    D4 -- Không --> A8B["⚠️ Lỗi validation\\ntoạ độ hoặc radius"]
    A8B --> A3
    D4 -- Có --> DB1[("💾 INSERT/UPDATE Pois")]
    DB1 --> SUCC1["✅ POI đã lưu thành công"]

    SUCC1 --> D6{"Tạo Translation\\nngay?"}
    D6 -- Có --> TRANS["🧑 Chọn Language\\nNhập Title, Summary, Audio"]
    D6 -- Không --> ENDOK

    TRANS --> DB2[("💾 CHECK UNIQUE\\nPoiId + Language")]
    DB2 --> D7{"Unique OK?"}
    D7 -- Không --> A13["⚠️ Translation ngôn ngữ\\nnày đã tồn tại"]
    A13 --> TRANS
    D7 -- Có --> DB3[("💾 INSERT PoiTranslations\\nIsPublished = false")]
    DB3 --> D8{"Publish luôn?"}
    D8 -- Có --> DB4[("💾 SET IsPublished = true")]
    D8 -- Không --> SKIP1["📄 Lưu bản nháp"]
    DB4 --> ENDOK(("✅ Hoàn tất"))
    SKIP1 --> ENDOK

    A12 --> DB5[("💾 UPDATE Pois\\nSET IsActive = toggle")]
    DB5 --> ENDOK

    D5 -- Có --> A14["⚠️ Không thể xoá\\nPOI đang trong Tour"]
    D5 -- Không --> DB6[("💾 DELETE Pois\\nCASCADE Translation, QR")]
    A14 --> ENDOK
    DB6 --> ENDOK`
        },

        // =============================================
        // 5. TOUR MANAGEMENT (F03)
        // =============================================
        {
            id: 'tour',
            title: 'A05 — Quản lý Tour & TourStop',
            desc: 'Luồng Admin tạo tuyến tham quan, gán danh sách POI theo thứ tự, bật/tắt tour cho Visitor sử dụng.',
            sequences: 'F03, J03 Pha 2',
            actors: 'Admin, Browser, ASP.NET MVC, SQL Server',
            meta: [
                {
                    title: 'User Actions',
                    items: [
                        'Tạo Tour mới với tên, mô tả, ngôn ngữ',
                        'Chọn POI từ danh sách để thêm vào Tour',
                        'Sắp xếp thứ tự TourStop bằng SortOrder',
                        'Bật / tắt Tour cho Visitor'
                    ]
                },
                {
                    title: 'Decision Points',
                    items: [
                        'Tour phải có ít nhất 1 Stop để publish',
                        'SortOrder phải unique trong cùng Tour',
                        'POI được chọn phải IsActive = true',
                        'Xoá Tour sẽ cascade xoá toàn bộ Stop'
                    ]
                },
                {
                    title: 'Database Operations',
                    items: [
                        '<code>INSERT/UPDATE/DELETE Tours</code>',
                        '<code>INSERT/UPDATE/DELETE TourStops</code>',
                        '<code>SELECT Pois WHERE IsActive</code> — cho dropdown',
                        'CHECK UNIQUE (<code>TourId + SortOrder</code>)'
                    ]
                }
            ],
            mermaid: `flowchart TD
    START(( )) --> A1["🧑 Admin vào trang\\nQuản lý Tour"]
    A1 --> DB0[("💾 SELECT Tours\\n+ StopCount")]
    DB0 --> A2["📄 Hiển thị danh sách Tour"]
    A2 --> D1{"Thao tác?"}

    D1 -- "Tạo Tour" --> A3["🧑 Nhập Name, Description\\nLanguage, CoverImage"]
    D1 -- "Sửa Tour" --> A3B["🧑 Load Tour hiện tại\\nchỉnh sửa thông tin"]
    D1 -- "Quản lý Stop" --> A7
    D1 -- "Toggle Active" --> D5
    D1 -- "Xoá Tour" --> DB6

    A3 --> DB1[("💾 INSERT Tours\\nIsActive = false")]
    A3B --> DB1B[("💾 UPDATE Tours")]
    DB1 --> A4["✅ Tour đã tạo"]
    DB1B --> A4

    A4 --> A7["🧑 Vào màn hình\\nQuản lý TourStop"]
    A7 --> DB2[("💾 SELECT Pois\\nWHERE IsActive = true")]
    DB2 --> A8["📄 Hiển thị POI\\ncó thể chọn + thứ tự hiện tại"]
    A8 --> A9["🧑 Chọn POI + nhập SortOrder\\nAutoPlay, Note"]
    A9 --> DB3[("💾 CHECK UNIQUE\\nTourId + SortOrder")]
    DB3 --> D2{"SortOrder\\ntrùng?"}
    D2 -- Có --> A10["⚠️ SortOrder đã tồn tại\\nchọn số khác"]
    A10 --> A9
    D2 -- Không --> DB4[("💾 INSERT TourStops")]
    DB4 --> D3{"Thêm Stop\\nnữa?"}
    D3 -- Có --> A9
    D3 -- Không --> A11["📄 Xem preview\\ndanh sách Stop theo thứ tự"]

    A11 --> D5{"Publish Tour?\\n(Bật IsActive)"}
    D5 --> D4{"Tour có\\n>= 1 Stop?"}
    D4 -- Không --> A12["⚠️ Tour phải có\\nít nhất 1 Stop"]
    A12 --> A7
    D4 -- Có --> DB5[("💾 UPDATE Tours\\nSET IsActive = true")]
    DB5 --> ENDOK(("✅ Tour published\\nhiện trong Bootstrap"))

    DB6[("💾 DELETE Tours\\nCASCADE TourStops")] --> ENDOK`
        },

        // =============================================
        // 6. QR CODE LOOKUP + ANALYTICS (F09, F10)
        // =============================================
        {
            id: 'qr',
            title: 'A06 — QR Lookup & Analytics Dashboard',
            desc: 'Luồng Visitor quét QR để vào POI cụ thể và luồng Admin xem Dashboard / Analytics để đo hiệu quả vận hành.',
            sequences: 'F09, F10, J03 Pha 3',
            actors: 'Visitor, Admin, Mobile App, Browser, Backend API, SQL Server',
            meta: [
                {
                    title: 'QR Lookup Flow',
                    items: [
                        'Visitor quét QR hoặc nhập mã thủ công',
                        '<code>GET /api/qrcode/{code}</code> tra cứu',
                        'Trả về POI + Translation + AudioUrl',
                        'App phát audio hoặc hiển thị bài đọc'
                    ]
                },
                {
                    title: 'Analytics Flow',
                    items: [
                        'Admin vào Dashboard xem KPI tổng quan',
                        '<code>GET /api/analytics/overview</code>',
                        '<code>GET /api/analytics/top-poi</code> — Top POI',
                        '<code>GET /api/heatmap</code> — Heatmap tracking'
                    ]
                },
                {
                    title: 'Database Queries',
                    items: [
                        '<code>SELECT QRCodes WHERE Code</code> → <code>JOIN Pois</code>',
                        '<code>COUNT(*) VisitHistories, UserTrackings</code>',
                        '<code>GROUP BY PoiId</code> → Top POI lượt nghe',
                        '<code>AVG(Duration)</code> → Thời lượng nghe TB'
                    ]
                }
            ],
            mermaid: `flowchart TD
    START(( )) --> D0{"Ai đang dùng?"}

    D0 -- Visitor --> V1["🧑 Mở tab QR\\ntrên Mobile App"]
    D0 -- Admin --> AD1["🧑 Mở Dashboard\\ntrên Admin site"]

    V1 --> D1{"Phương thức\\nnhập QR?"}
    D1 -- "Quét Camera" --> V2["📱 Mở camera scan\\nđọc QR code"]
    D1 -- "Nhập thủ công" --> V3["🧑 Gõ mã QR\\nvào ô input"]
    D1 -- "Dán clipboard" --> V4["📱 Paste từ clipboard"]

    V2 --> V5["📱 GET /api/qrcode/{code}"]
    V3 --> V5
    V4 --> V5

    V5 --> DB1[("💾 SELECT QRCodes\\nWHERE Code = input")]
    DB1 --> D2{"Tìm thấy\\nQR code?"}
    D2 -- Không --> V6["⚠️ Mã QR không hợp lệ\\nhoặc không tồn tại"]
    V6 --> V1
    D2 -- Có --> DB2[("💾 SELECT Pois\\nJOIN PoiTranslations\\nWHERE PoiId = qr.PoiId")]
    DB2 --> V7["📱 Hiển thị chi tiết POI\\nTitle, Summary, Map"]
    V7 --> D3{"Có Audio\\nhoặc TTS?"}
    D3 -- Có --> V8["🔊 Phát Audio\\nhoặc đọc TTS"]
    D3 -- Không --> V9["📱 Hiển thị\\nnội dung text"]
    V8 --> ENDV(("✅ Visitor\\nxem xong POI"))
    V9 --> ENDV

    AD1 --> AD2["⚙️ GET /api/analytics/overview"]
    AD2 --> DB3[("💾 COUNT Pois, Visits\\nTrackings, Tours, UniqueVisitors")]
    DB3 --> AD3["📄 Hiển thị KPI Cards\\nTổng POI, Visits, Visitors"]
    AD3 --> AD4["⚙️ GET /api/analytics/top-poi"]
    AD4 --> DB4[("💾 SELECT PoiId, COUNT(*)\\nFROM VisitHistories\\nGROUP BY PoiId\\nORDER BY DESC")]
    DB4 --> AD5["📄 Hiển thị bảng\\nTop POI theo lượt nghe"]
    AD5 --> AD6["⚙️ GET /api/analytics/avg-listen-duration"]
    AD6 --> DB5[("💾 SELECT AVG(Duration)\\nFROM VisitHistories")]
    DB5 --> AD7["📄 Hiển thị chart\\nThời lượng nghe trung bình"]
    AD7 --> AD8["⚙️ GET /api/heatmap"]
    AD8 --> DB6[("💾 SELECT lat, lng, COUNT\\nFROM UserTrackings\\nGROUP BY grid cell")]
    DB6 --> AD9["📄 Render Heatmap\\ntrên bản đồ Leaflet"]
    AD9 --> ENDA(("✅ Admin\\nxem xong Analytics"))`
        }
    ];

    // ===== Render =====
    async function renderDiagram(code, container) {
        try {
            const id = `ad-${Math.random().toString(36).slice(2)}`;
            const { svg } = await mermaid.render(id, code);
            container.innerHTML = svg;
        } catch (err) {
            container.innerHTML = `<pre style="color:#b42318;white-space:pre-wrap;font-size:0.82rem;">${err.message}\n\n${code}</pre>`;
        }
    }

    // ===== Build UI =====
    const tabBar = document.getElementById('tabBar');
    tabBar.innerHTML = activities.map((a, i) =>
        `<button class="tab-btn ${i === 0 ? 'active' : ''}" data-idx="${i}">${a.title}</button>`
    ).join('');

    const contentEl = document.getElementById('content');
    contentEl.innerHTML = activities.map((a, i) => `
        <div class="tab-content ${i === 0 ? 'active' : ''}" data-idx="${i}">
            <div class="card">
                <h2>${a.title}</h2>
                <p class="desc">${a.desc}</p>

                <div class="lane-legend">
                    <span><div class="dot user"></div> User Action (🧑)</span>
                    <span><div class="dot system"></div> System Processing (⚙️/📱)</span>
                    <span><div class="dot db"></div> Database Operation (💾)</span>
                    <span><div class="dot decision"></div> Decision / Guard (❓)</span>
                </div>

                <div class="meta-grid">
                    ${a.meta.map(m => `
                        <div class="meta-box">
                            <h4>${m.title}</h4>
                            <ul>${m.items.map(it => `<li>${it}</li>`).join('')}</ul>
                        </div>
                    `).join('')}
                </div>

                <table class="summary-table">
                    <tr><th>Actors</th><td>${a.actors}</td></tr>
                    <tr><th>Sequence liên quan</th><td>${a.sequences}</td></tr>
                </table>

                <div style="margin-top:1.2rem;">
                    <div class="diagram-stage" id="stage-${a.id}"></div>
                </div>
            </div>
        </div>
    `).join('');

    // ===== Tab switching =====
    const rendered = new Set();

    tabBar.addEventListener('click', async (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        const idx = btn.dataset.idx;

        tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        contentEl.querySelectorAll('.tab-content').forEach(c => {
            c.classList.toggle('active', c.dataset.idx === idx);
        });

        if (!rendered.has(idx)) {
            rendered.add(idx);
            const a = activities[idx];
            const stage = document.getElementById(`stage-${a.id}`);
            if (stage) await renderDiagram(a.mermaid, stage);
        }
    });

    // Initial render
    rendered.add('0');
    await renderDiagram(activities[0].mermaid, document.getElementById(`stage-${activities[0].id}`));
</script>

</body>
