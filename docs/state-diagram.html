<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioGuideSystem — State Diagram (UML)</title>
    <style>
        :root {
            --ink: #17212b;
            --paper: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --primary: #7c3aed;
            --primary-soft: #f5f3ff;
            --accent: #0f766e;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI Variable", "Aptos", "Segoe UI", system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #fafbff 50%, #f0fdf4 100%);
            color: var(--ink);
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #2e1065, #4c1d95, #1e3a5f);
            color: white;
            padding: 2rem 2rem 1.6rem;
            text-align: center;
        }
        header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; }
        header p { opacity: 0.8; margin-top: 0.4rem; font-size: 0.95rem; }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            padding: 1rem 1rem 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border);
            background: var(--surface);
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--ink);
        }
        .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 1.2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-size: 1.15rem;
            margin-bottom: 0.2rem;
            color: var(--primary);
        }
        .card .desc {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 1rem;
        }

        .diagram-stage {
            display: flex;
            justify-content: center;
            min-height: 200px;
            overflow-x: auto;
        }
        .diagram-stage svg { max-width: 100%; height: auto; }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .meta-box {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.9rem 1rem;
            font-size: 0.82rem;
        }
        .meta-box h4 {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            margin-bottom: 0.4rem;
        }
        .meta-box ul { padding-left: 1.1rem; }
        .meta-box li { margin-bottom: 0.2rem; }
        .meta-box code {
            background: #ede9fe;
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-size: 0.78rem;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .summary-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 0.8rem; }
        .summary-table th, .summary-table td { padding: 0.5rem 0.7rem; border: 1px solid var(--border); text-align: left; vertical-align: top; }
        .summary-table th { background: #f1f5f9; font-weight: 700; }
        .summary-table code { background: #ede9fe; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.76rem; }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: #94a3b8;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>AudioGuideSystem — State Diagram (UML)</h1>
    <p>Biểu đồ trạng thái cho 8 đối tượng nghiệp vụ — suy ra từ PRD, Sequence Diagrams & Database</p>
</header>

<div class="tabs" id="tabBar"></div>

<div class="container" id="content"></div>

<footer>AudioGuideSystem PRD · State Diagrams · Rendered by Mermaid.js</footer>

<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'default',
        fontFamily: 'Segoe UI Variable, Aptos, Segoe UI, sans-serif'
    });

    const states = [
        // =============================================
        // 1. POI
        // =============================================
        {
            id: 'poi',
            title: 'POI (Point of Interest)',
            desc: 'Vòng đời nội dung điểm thuyết minh — từ lúc tạo bản nháp đến khi xuất bản và có thể bị ẩn hoặc xoá.',
            dbField: 'Pois.IsActive',
            sequences: 'F01, J03',
            meta: [
                {
                    title: 'Các trạng thái',
                    items: [
                        '<code>Draft</code> — Vừa tạo, chưa đủ dữ liệu hoặc chưa bật active',
                        '<code>Active</code> — Đã bật IsActive = true, xuất hiện trong Bootstrap & Geofence',
                        '<code>Inactive</code> — Admin tắt IsActive, biến mất khỏi runtime',
                        '<code>Deleted</code> — Soft delete hoặc xoá vĩnh viễn'
                    ]
                },
                {
                    title: 'Điều kiện chuyển (Guards)',
                    items: [
                        'Draft → Active: Phải có toạ độ hợp lệ, Radius > 0, tên không rỗng',
                        'Active → Inactive: Admin toggle IsActive = false',
                        'Inactive → Active: Admin toggle IsActive = true (dữ liệu vẫn hợp lệ)',
                        'Any → Deleted: Admin xác nhận xoá'
                    ]
                },
                {
                    title: 'Mapping DB',
                    items: [
                        '<code>IsActive = false</code> + chưa đủ dữ liệu → Draft',
                        '<code>IsActive = true</code> → Active',
                        '<code>IsActive = false</code> + đã từng active → Inactive',
                        'Record bị DELETE → Deleted (Final State)'
                    ]
                }
            ],
            mermaid: `stateDiagram-v2
    [*] --> Draft : Admin tạo POI mới

    Draft --> Active : Validate OK\\n[Toạ độ, Radius > 0]\\n/ INSERT IsActive=true
    Draft --> Deleted : Admin xoá bản nháp

    Active --> Inactive : Admin tắt hiển thị\\n/ SET IsActive=false
    Active --> Active : Admin chỉnh sửa nội dung\\n/ UPDATE fields
    Active --> Deleted : Admin xoá POI

    Inactive --> Active : Admin bật lại\\n[Dữ liệu vẫn hợp lệ]\\n/ SET IsActive=true
    Inactive --> Deleted : Admin xoá POI

    Deleted --> [*]

    state Active {
        [*] --> Visible
        Visible --> Triggered : Visitor vào vùng Geofence
        Triggered --> Visible : Hết Cooldown
    }

    note right of Draft : POI chưa đủ dữ liệu\\nhoặc chưa bật active
    note right of Active : Xuất hiện trong\\nBootstrap & Map Feed
    note left of Deleted : Cascade xoá Translation,\\nQR, Trigger, Visit`
        },

        // =============================================
        // 2. TRANSLATION
        // =============================================
        {
            id: 'translation',
            title: 'POI Translation',
            desc: 'Vòng đời bản dịch đa ngôn ngữ — kiểm soát nội dung nào được phục vụ cho Visitor trên runtime.',
            dbField: 'PoiTranslations.IsPublished',
            sequences: 'F02, J03',
            meta: [
                {
                    title: 'Các trạng thái',
                    items: [
                        '<code>Unpublished</code> — Bản dịch đang soạn, chưa hiển thị cho visitor',
                        '<code>Published</code> — Nội dung đã sẵn sàng, vào runtime API',
                        '<code>Deleted</code> — Bản dịch bị xoá'
                    ]
                },
                {
                    title: 'Điều kiện chuyển (Guards)',
                    items: [
                        'Unpublished → Published: Title không rỗng, UNIQUE(PoiId + Language) thoả mãn',
                        'Published → Unpublished: Admin thu hồi để chỉnh sửa',
                        'Any → Deleted: Admin xoá bản dịch'
                    ]
                },
                {
                    title: 'Mapping DB',
                    items: [
                        '<code>IsPublished = false</code> → Unpublished',
                        '<code>IsPublished = true</code> → Published',
                        'Record bị DELETE → Deleted'
                    ]
                }
            ],
            mermaid: `stateDiagram-v2
    [*] --> Unpublished : Admin tạo Translation mới

    Unpublished --> Published : Publish nội dung\\n[Title != null, UNIQUE OK]\\n/ SET IsPublished=true
    Unpublished --> Unpublished : Admin chỉnh sửa bản nháp\\n/ UPDATE fields
    Unpublished --> Deleted : Admin xoá bản dịch

    Published --> Unpublished : Thu hồi để sửa\\n/ SET IsPublished=false
    Published --> Published : Cập nhật nội dung trực tiếp\\n/ UPDATE fields
    Published --> Deleted : Admin xoá bản dịch

    Deleted --> [*]

    note right of Published : Vào Bootstrap API\\nvà Nearby API
    note left of Unpublished : Chỉ thấy trong Admin`
        },

        // =============================================
        // 3. TOUR
        // =============================================
        {
            id: 'tour',
            title: 'Tour',
            desc: 'Vòng đời tuyến tham quan — từ thiết kế, gán trạm dừng, đến công bố cho Visitor.',
            dbField: 'Tours.IsActive',
            sequences: 'F03, J03',
            meta: [
                {
                    title: 'Các trạng thái',
                    items: [
                        '<code>Designing</code> — Tour vừa tạo, chưa có Stop hoặc chưa bật',
                        '<code>Ready</code> — Đã có ít nhất 1 TourStop, sẵn sàng publish',
                        '<code>Published</code> — IsActive = true, hiển thị cho Visitor',
                        '<code>Archived</code> — IsActive = false sau khi từng publish',
                        '<code>Deleted</code> — Tour bị xoá hoàn toàn'
                    ]
                },
                {
                    title: 'Điều kiện chuyển (Guards)',
                    items: [
                        'Designing → Ready: TourStops.Count >= 1',
                        'Ready → Published: Admin bật IsActive = true',
                        'Published → Archived: Admin tắt IsActive',
                        'Archived → Published: Admin bật lại'
                    ]
                },
                {
                    title: 'Mapping DB',
                    items: [
                        '<code>IsActive=false</code> + TourStops=0 → Designing',
                        '<code>IsActive=false</code> + TourStops>=1 → Ready hoặc Archived',
                        '<code>IsActive=true</code> → Published',
                        'Record bị DELETE → Deleted'
                    ]
                }
            ],
            mermaid: `stateDiagram-v2
    [*] --> Designing : Admin tạo Tour mới

    Designing --> Ready : Gán TourStop\\n[Stops >= 1]\\n/ INSERT TourStops
    Designing --> Deleted : Xoá tour trống

    Ready --> Published : Bật công bố\\n/ SET IsActive=true
    Ready --> Designing : Xoá hết Stop\\n[Stops = 0]
    Ready --> Deleted : Xoá tour

    Published --> Archived : Tắt hiển thị\\n/ SET IsActive=false
    Published --> Published : Chỉnh sửa Stop / Thứ tự\\n/ UPDATE SortOrder

    Archived --> Published : Bật lại\\n[Stops >= 1]\\n/ SET IsActive=true
    Archived --> Deleted : Xoá tour

    Deleted --> [*]

    note right of Published : Hiển thị trong Bootstrap\\nvà Mobile Tour list
    note right of Designing : Chưa có Stop nào`
        },

        // =============================================
        // 4. VISITOR SESSION
        // =============================================
        {
            id: 'visitor',
            title: 'Visitor Session (Mobile App)',
            desc: 'Vòng đời phiên tham quan của Visitor — từ mở app, cấp quyền, bootstrap dữ liệu đến tracking & audio.',
            dbField: 'Visitors.LastSeenAt + AllowAutoPlay + AllowBackgroundTracking',
            sequences: 'J01, J02, F05, F06, F07',
            meta: [
                {
                    title: 'Các trạng thái',
                    items: [
                        '<code>AppOpened</code> — Visitor vừa mở ứng dụng',
                        '<code>Bootstrapped</code> — Đã tải dữ liệu POI & Tour từ server',
                        '<code>PermissionGranted</code> — Đã cấp quyền vị trí (Location Permission)',
                        '<code>Tracking</code> — GPS đang gửi toạ độ định kỳ lên server',
                        '<code>Exploring</code> — Đang tương tác (xem map, nghe audio, đi tour)',
                        '<code>PermissionDenied</code> — Từ chối quyền vị trí',
                        '<code>SessionEnded</code> — Tắt app hoặc dừng tracking'
                    ]
                },
                {
                    title: 'Actions khi chuyển',
                    items: [
                        'AppOpened → Bootstrapped: <code>GET /api/bootstrap</code>',
                        'Bootstrapped → PermissionGranted: <code>OS.RequestPermission()</code>',
                        'PermissionGranted → Tracking: <code>StartForegroundService()</code>',
                        'Tracking → Exploring: Tự động khi có geofence trigger',
                        'Any → SessionEnded: <code>StopTracking()</code> hoặc app bị kill'
                    ]
                }
            ],
            mermaid: `stateDiagram-v2
    [*] --> AppOpened : Visitor mở ứng dụng

    AppOpened --> Bootstrapped : Bấm Bootstrap\\n/ GET /api/bootstrap

    Bootstrapped --> PermissionGranted : OS cấp quyền vị trí\\n/ Permission Granted
    Bootstrapped --> PermissionDenied : OS từ chối\\n/ Permission Denied

    PermissionDenied --> Bootstrapped : Visitor vào Settings\\ncấp quyền thủ công
    PermissionDenied --> SessionEnded : Tắt app

    PermissionGranted --> Tracking : Bấm Bật Tracking\\n/ StartForegroundService()

    state Tracking {
        [*] --> Sending
        Sending --> Waiting : POST /tracking OK\\n/ Chờ interval tiếp
        Waiting --> Sending : Timer interval hết\\n/ Lấy GPS mới
    }

    Tracking --> Exploring : Geofence trigger kích hoạt\\n/ Audio enqueue

    state Exploring {
        [*] --> Listening
        Listening --> MapViewing : Audio kết thúc\\n/ POST /visit
        MapViewing --> Listening : Trigger POI mới\\n/ Enqueue audio
        MapViewing --> TourFollowing : Chọn Tour\\n/ Load TourStops
        TourFollowing --> Listening : Đến Stop tiếp\\n/ AutoPlay audio
    }

    Exploring --> Tracking : Rời vùng POI\\n/ Tiếp tục tracking
    Tracking --> SessionEnded : Bấm Tắt Tracking\\n/ StopForegroundService()
    Exploring --> SessionEnded : Tắt app

    SessionEnded --> [*]

    note right of Tracking : GPS gửi định kỳ\\nmỗi 10 giây
    note right of Exploring : Visitor đang tương tác\\nvới nội dung POI`
        },

        // =============================================
        // 5. GEOFENCE TRIGGER
        // =============================================
        {
            id: 'geofence',
            title: 'Geofence Trigger',
            desc: 'Máy trạng thái đánh giá geofence — kiểm tra khoảng cách, mode, cooldown và debounce trước khi trigger.',
            dbField: 'GeofenceTriggers.Status + CooldownUntil',
            sequences: 'J02, F06',
            meta: [
                {
                    title: 'Các trạng thái',
                    items: [
                        '<code>Idle</code> — Visitor ngoài vùng geofence',
                        '<code>Approaching</code> — Trong ApproachRadius nhưng ngoài Radius',
                        '<code>InsideZone</code> — Trong Radius, đang đánh giá trigger',
                        '<code>Evaluating</code> — Kiểm tra Cooldown & Debounce',
                        '<code>Triggered</code> — Đủ điều kiện, đã ghi trigger + phát audio',
                        '<code>Cooldown</code> — Đã trigger, đang chờ hết thời gian cooldown',
                        '<code>Skipped</code> — Bị chặn bởi cooldown/debounce/manual mode'
                    ]
                },
                {
                    title: 'Guards & Conditions',
                    items: [
                        'Approaching → InsideZone: <code>distance <= Radius</code>',
                        'InsideZone → Triggered: <code>Cooldown hết + Debounce OK + Mode != manual</code>',
                        'InsideZone → Skipped: <code>CooldownUntil > now</code> hoặc <code>Mode = manual</code>',
                        'Triggered → Cooldown: Ngay sau khi ghi trigger, <code>CooldownUntil = now + CooldownSeconds</code>'
                    ]
                },
                {
                    title: 'Mapping DB',
                    items: [
                        '<code>Status = triggered</code> → Triggered',
                        '<code>Status = skipped</code> → Skipped',
                        '<code>CooldownUntil > DateTime.Now</code> → Cooldown',
                        '<code>CooldownUntil <= DateTime.Now</code> → trở lại Idle'
                    ]
                }
            ],
            mermaid: `stateDiagram-v2
    [*] --> Idle : Visitor mở tracking

    Idle --> Approaching : Vào ApproachRadius\\n[distance <= approachRadius]
    Idle --> InsideZone : Vào thẳng Radius\\n[distance <= radius]

    Approaching --> InsideZone : Tiến gần hơn\\n[distance <= radius]
    Approaching --> Idle : Đi xa ra\\n[distance > approachRadius]

    InsideZone --> Evaluating : Kiểm tra điều kiện Trigger

    state Evaluating {
        [*] --> CheckMode
        CheckMode --> CheckCooldown : Mode = enter|nearby|both
        CheckMode --> ManualOnly : Mode = manual
        CheckCooldown --> CheckDebounce : CooldownUntil <= now
        CheckCooldown --> CooldownActive : CooldownUntil > now
        CheckDebounce --> PassAll : Debounce OK
        CheckDebounce --> DebounceActive : Quá nhanh
    }

    Evaluating --> Triggered : Thoả tất cả điều kiện\\n/ INSERT GeofenceTrigger\\n/ Response ShouldPlay=true
    Evaluating --> Skipped : Vi phạm rule\\n/ Response ShouldPlay=false

    Triggered --> Cooldown : Ghi CooldownUntil\\n/ cooldownUntil = now + cooldownSec

    Cooldown --> Idle : Hết cooldown\\n[CooldownUntil <= now]

    Skipped --> Idle : Location update tiếp theo

    note right of Triggered : Audio được enqueue\\nvào hàng đợi phát
    note left of Skipped : Không phát audio\\nlog reason vào Status`
        },

        // =============================================
        // 6. AUDIO PLAYBACK
        // =============================================
        {
            id: 'audio',
            title: 'Audio Playback (Mobile)',
            desc: 'Máy trạng thái điều khiển hàng đợi audio — quản lý việc phát tuần tự, TTS fallback và ghi visit history.',
            dbField: 'VisitHistories (kết quả playback)',
            sequences: 'J02, F06, F08',
            meta: [
                {
                    title: 'Các trạng thái',
                    items: [
                        '<code>Idle</code> — Không có audio trong queue',
                        '<code>Queued</code> — Có audio chờ phát',
                        '<code>Playing</code> — Đang phát audio file',
                        '<code>PlayingTTS</code> — Đang phát bằng Text-to-Speech',
                        '<code>Paused</code> — Bị tạm dừng (user hoặc phone call)',
                        '<code>Completed</code> — Phát xong 1 bài, ghi visit history',
                        '<code>Error</code> — Lỗi phát audio'
                    ]
                },
                {
                    title: 'Actions',
                    items: [
                        'Queued → Playing: <code>MediaPlayer.Start(url)</code>',
                        'Playing → Completed: <code>POST /api/visit</code> ghi lịch sử',
                        'Error → PlayingTTS: Fallback sang TTS engine',
                        'Completed → Queued: Nếu queue còn bài tiếp theo'
                    ]
                }
            ],
            mermaid: `stateDiagram-v2
    [*] --> Idle : App khởi động

    Idle --> Queued : Geofence trigger\\n/ Enqueue(audioUrl, tts)

    Queued --> Playing : Có AudioUrl\\n/ MediaPlayer.Start(url)
    Queued --> PlayingTTS : Không có AudioUrl\\n/ TTS.Speak(script)

    Playing --> Paused : Interruption\\n(phone call, user pause)
    Paused --> Playing : Resume\\n/ MediaPlayer.Resume()

    Playing --> Completed : Phát xong\\n/ Ghi endTime
    Playing --> Error : Lỗi load/decode\\n/ Log error

    PlayingTTS --> Completed : TTS đọc xong\\n/ Ghi endTime
    PlayingTTS --> Error : TTS engine lỗi

    Error --> PlayingTTS : Fallback TTS\\n[Có TtsScript]
    Error --> Completed : Không có fallback\\n/ Ghi WasCompleted=false

    Completed --> Queued : Queue còn bài\\n/ POST /api/visit\\n/ PlayNext()
    Completed --> Idle : Queue hết\\n/ POST /api/visit

    note right of Playing : AudioMode audio\\nhoặc audio-priority
    note right of PlayingTTS : AudioMode tts\\nhoặc fallback từ lỗi
    note left of Completed : VisitHistory ghi\\nstartTime endTime duration`
        },

        // =============================================
        // 7. ADMIN SESSION
        // =============================================
        {
            id: 'admin',
            title: 'Admin Session',
            desc: 'Vòng đời phiên đăng nhập Admin — kiểm soát bảo mật và timeout session 8 giờ.',
            dbField: 'AdminUsers + Session Cookie (HttpOnly)',
            sequences: 'F11, J03',
            meta: [
                {
                    title: 'Các trạng thái',
                    items: [
                        '<code>Anonymous</code> — Chưa đăng nhập, chỉ thấy trang Login',
                        '<code>FirstBoot</code> — Hệ thống rỗng, hiện form đăng ký Admin đầu tiên',
                        '<code>Authenticated</code> — Đã login, session hợp lệ',
                        '<code>Expired</code> — Session hết hạn 8 giờ',
                        '<code>LoggedOut</code> — Admin chủ động đăng xuất'
                    ]
                },
                {
                    title: 'Guards',
                    items: [
                        'Anonymous → FirstBoot: <code>AdminUsers.Count() == 0</code>',
                        'Anonymous → Authenticated: <code>Hash(input) == PasswordHash</code>',
                        'Authenticated → Expired: <code>SessionAge > 8h</code>',
                        'FirstBoot → Authenticated: Sau khi register thành công'
                    ]
                },
                {
                    title: 'Mapping',
                    items: [
                        'Session Cookie tồn tại + chưa hết hạn → Authenticated',
                        'Không có Cookie hoặc hết hạn → Anonymous',
                        'DB AdminUsers trống → FirstBoot'
                    ]
                }
            ],
            mermaid: `stateDiagram-v2
    [*] --> Anonymous : Truy cập Admin site

    Anonymous --> FirstBoot : DB Admin trống\\n[AdminUsers.Count = 0]
    Anonymous --> Authenticated : Login thành công\\n[Hash match]\\n/ CreateSession()
    Anonymous --> Anonymous : Sai mật khẩu\\n/ 401 Error

    FirstBoot --> Authenticated : Đăng ký Admin đầu tiên\\n/ INSERT AdminUser\\n/ CreateSession()

    state Authenticated {
        [*] --> Dashboard
        Dashboard --> ContentManagement : Vào quản lý nội dung
        ContentManagement --> Dashboard : Quay về dashboard
        ContentManagement --> ContentManagement : CRUD POI, Tour,\\nTranslation, Audio
        Dashboard --> Analytics : Xem báo cáo
        Analytics --> Dashboard : Quay về
    }

    Authenticated --> Expired : Hết hạn 8 giờ\\n/ Session timeout
    Authenticated --> LoggedOut : Bấm Đăng xuất\\n/ DestroySession()

    Expired --> Anonymous : Redirect về Login
    LoggedOut --> Anonymous : Redirect về Login

    note right of FirstBoot : Chỉ xảy ra 1 lần\\nkhi hệ thống mới cài
    note right of Authenticated : Session = HttpOnly Cookie\\nTimeout = 8 giờ`
        },

        // =============================================
        // 8. TRACKING SERVICE
        // =============================================
        {
            id: 'tracking',
            title: 'Tracking Service (GPS)',
            desc: 'Máy trạng thái dịch vụ GPS Foreground Service — quản lý chu kỳ thu thập và gửi toạ độ lên server.',
            dbField: 'UserTrackings (batch records)',
            sequences: 'J01, F07',
            meta: [
                {
                    title: 'Các trạng thái',
                    items: [
                        '<code>Stopped</code> — Service chưa chạy, không thu GPS',
                        '<code>Starting</code> — Đang khởi động Foreground Service',
                        '<code>Collecting</code> — Đang lấy GPS sample từ OS',
                        '<code>Sending</code> — Đang POST batch lên server',
                        '<code>Retrying</code> — Gửi thất bại, lưu cache chờ retry',
                        '<code>Paused</code> — App ra background (nếu không có background permission)'
                    ]
                },
                {
                    title: 'Actions',
                    items: [
                        'Starting → Collecting: <code>OS.StartLocationUpdates(interval)</code>',
                        'Collecting → Sending: <code>POST /api/tracking {lat, lng, speed}</code>',
                        'Sending fail → Retrying: <code>SaveToLocalCache()</code>',
                        'Retrying → Sending: Timer retry + network available'
                    ]
                }
            ],
            mermaid: `stateDiagram-v2
    [*] --> Stopped : App khởi động

    Stopped --> Starting : Bấm Bật Tracking\\n/ RequestPermission()

    Starting --> Collecting : Permission OK\\n/ OS.StartLocationUpdates(10s)
    Starting --> Stopped : Permission Denied

    state Collecting {
        [*] --> WaitingGPS
        WaitingGPS --> GotSample : OS callback\\n/ lat, lng, accuracy, speed
        GotSample --> Batching : Thêm vào buffer
        Batching --> WaitingGPS : Buffer chưa đầy
        Batching --> ReadyToSend : Buffer đủ hoặc timer interval
    }

    Collecting --> Sending : Batch sẵn sàng\\n/ POST /api/tracking

    Sending --> Collecting : 200 OK\\n/ Clear buffer, tiếp tục
    Sending --> Retrying : Timeout hoặc 503\\n/ SaveToLocalCache()

    Retrying --> Sending : Network recovery\\n/ Retry cached data
    Retrying --> Collecting : Retry thành công\\n/ Clear cache

    Collecting --> Paused : App vào background\\n[AllowBackground = false]
    Paused --> Collecting : App quay lại foreground

    Collecting --> Stopped : Bấm Tắt Tracking\\n/ OS.StopLocationUpdates()
    Paused --> Stopped : Bấm Tắt Tracking

    Stopped --> [*] : Tắt app

    note right of Collecting : Interval mặc định 10s\\nBatch 1 đến 5 samples
    note left of Retrying : Dữ liệu cache cục bộ\\nsẽ retry khi có mạng`
        }
    ];

    // ===== Render =====
    async function renderDiagram(code, container) {
        try {
            const id = `sd-${Math.random().toString(36).slice(2)}`;
            const { svg } = await mermaid.render(id, code);
            container.innerHTML = svg;
        } catch (err) {
            container.innerHTML = `<pre style="color:#b42318;white-space:pre-wrap;font-size:0.82rem;">${err.message}</pre>`;
        }
    }

    // ===== Build Tabs =====
    const tabBar = document.getElementById('tabBar');
    tabBar.innerHTML = states.map((s, i) =>
        `<button class="tab-btn ${i === 0 ? 'active' : ''}" data-idx="${i}">${s.title}</button>`
    ).join('');

    // ===== Build Content =====
    const contentEl = document.getElementById('content');
    contentEl.innerHTML = states.map((s, i) => `
        <div class="tab-content ${i === 0 ? 'active' : ''}" data-idx="${i}">
            <div class="card">
                <h2>${s.title}</h2>
                <p class="desc">${s.desc}</p>

                <div class="meta-grid">
                    ${s.meta.map(m => `
                        <div class="meta-box">
                            <h4>${m.title}</h4>
                            <ul>${m.items.map(it => `<li>${it}</li>`).join('')}</ul>
                        </div>
                    `).join('')}
                </div>

                <table class="summary-table">
                    <tr><th>DB Field</th><td><code>${s.dbField}</code></td></tr>
                    <tr><th>Sequence liên quan</th><td>${s.sequences}</td></tr>
                </table>

                <div style="margin-top:1.2rem;">
                    <div class="diagram-stage" id="stage-${s.id}"></div>
                </div>
            </div>
        </div>
    `).join('');

    // ===== Tab switching =====
    const rendered = new Set();

    tabBar.addEventListener('click', async (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        const idx = btn.dataset.idx;

        tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        contentEl.querySelectorAll('.tab-content').forEach(c => {
            c.classList.toggle('active', c.dataset.idx === idx);
        });

        if (!rendered.has(idx)) {
            rendered.add(idx);
            const s = states[idx];
            const stage = document.getElementById(`stage-${s.id}`);
            if (stage) await renderDiagram(s.mermaid, stage);
        }
    });

    // Initial render
    rendered.add('0');
    await renderDiagram(states[0].mermaid, document.getElementById(`stage-${states[0].id}`));
</script>

</body>
</html>
